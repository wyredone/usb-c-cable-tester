name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter psutil wmi pywin32 pystray Pillow pyinstaller

      - name: Build EXE
        run: pyinstaller usb_c_tester.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb_c_tester-exe
          path: dist/usb_c_tester.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/usb_c_tester.exe
